<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 - 한국진로진학연구원</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="karifavicon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar scrolled" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <img src="karifavicon.png" alt="한국진로진학연구원 로고" class="logo-img">
        <span class="logo-text">한국진로진학연구원</span>
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="메뉴 열기">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-menu" id="navMenu">
        <li><a href="index.html" class="nav-link">홈</a></li>
        <li class="nav-auth" id="navAuth"></li>
      </ul>
    </div>
  </nav>

  <!-- Admin Dashboard -->
  <main class="admin-page">
    <div class="container">
      <div class="admin-header">
        <h1>관리자 대시보드</h1>
        <p id="adminWelcome">관리자님 환영합니다</p>
      </div>

      <!-- Stats Cards -->
      <div class="admin-stats">
        <div class="stat-card">
          <div class="stat-number" id="statUsers">0</div>
          <div class="stat-label">총 회원 수</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="statStudents">0</div>
          <div class="stat-label">학생</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="statParents">0</div>
          <div class="stat-label">학부모</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="statTeachers">0</div>
          <div class="stat-label">교사</div>
        </div>
      </div>

      <!-- Tab Navigation -->
      <div class="admin-tabs">
        <button class="admin-tab active" data-tab="members">회원 관리</button>
        <button class="admin-tab" data-tab="posts">체험사례 관리</button>
      </div>

      <!-- Members Tab -->
      <div class="admin-panel" id="panel-members">
        <div class="panel-header">
          <h2>회원 목록</h2>
          <input type="text" class="search-input" id="memberSearch" placeholder="이름 또는 이메일로 검색...">
        </div>
        <div class="table-wrapper">
          <table class="admin-table">
            <thead>
              <tr>
                <th>이름</th>
                <th>이메일</th>
                <th>구분</th>
                <th>가입일</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="membersBody"></tbody>
          </table>
        </div>
        <p class="empty-msg" id="membersEmpty" style="display:none;">등록된 회원이 없습니다.</p>
      </div>

      <!-- Posts Tab -->
      <div class="admin-panel" id="panel-posts" style="display:none;">
        <!-- 체험사례 작성 폼 -->
        <div class="admin-post-form">
          <h3>체험사례 작성</h3>
          <form id="adminPostForm" class="admin-write-form">
            <div class="admin-write-grid">
              <div class="form-group">
                <label for="postAuthor">작성자</label>
                <input type="text" id="postAuthor" placeholder="예 : 김OO" required>
              </div>
              <div class="form-group">
                <label for="postRegion">지역</label>
                <input type="text" id="postRegion" placeholder="예 : 충청남도 천안시">
              </div>
            </div>
            <div class="form-group">
              <label for="postContent">내용</label>
              <textarea id="postContent" rows="4" placeholder="체험사례 내용을 입력하세요" required></textarea>
            </div>
            <div class="admin-write-actions">
              <button type="submit" class="admin-post-btn">등록</button>
            </div>
          </form>
        </div>
        <div class="panel-header">
          <h2>체험사례 목록</h2>
        </div>
        <div class="table-wrapper">
          <table class="admin-table">
            <thead>
              <tr>
                <th>작성자</th>
                <th>내용</th>
                <th>작성일</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="postsBody"></tbody>
          </table>
        </div>
        <p class="empty-msg" id="postsEmpty" style="display:none;">등록된 게시글이 없습니다.</p>
      </div>
    </div>
  </main>

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal-card">
      <h3>삭제 확인</h3>
      <p id="deleteModalText">정말로 삭제하시겠습니까?</p>
      <div class="modal-actions">
        <button class="modal-btn modal-cancel" id="deleteCancel">취소</button>
        <button class="modal-btn modal-confirm" id="deleteConfirm">삭제</button>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    // Access control - 개발 중 임시 해제 (배포 시 아래 주석 해제)
    (function() {
      const user = Auth.getCurrentUser();
      // if (!user || user.role !== 'admin') {
      //   alert('관리자만 접근할 수 있습니다.');
      //   window.location.href = 'index.html';
      //   return;
      // }
      if (user) {
        document.getElementById('adminWelcome').textContent = user.name + '님 환영합니다';
      }
      Auth.updateNavAuth();
    })();

    // Tab switching
    document.querySelectorAll('.admin-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.admin-panel').forEach(p => p.style.display = 'none');
        this.classList.add('active');
        document.getElementById('panel-' + this.dataset.tab).style.display = 'block';
      });
    });

    // Render members
    function renderMembers(filter) {
      const users = Auth.getAllUsers();
      const filtered = filter
        ? users.filter(u => u.name.includes(filter) || u.email.includes(filter))
        : users;
      const tbody = document.getElementById('membersBody');
      const empty = document.getElementById('membersEmpty');

      // Update stats
      document.getElementById('statUsers').textContent = users.length;
      document.getElementById('statStudents').textContent = users.filter(u => u.role === 'student').length;
      document.getElementById('statParents').textContent = users.filter(u => u.role === 'parent').length;
      document.getElementById('statTeachers').textContent = users.filter(u => u.role === 'teacher').length;

      if (filtered.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      const roleMap = { student: '학생', parent: '학부모', teacher: '교사', organization: '학원 및 단체', admin: '관리자' };

      tbody.innerHTML = filtered.map(u => {
        const escapedEmail = escapeHtml(u.email);
        const escapedName = escapeHtml(u.name);
        return '<tr>' +
          '<td>' + escapedName + '</td>' +
          '<td>' + escapedEmail + '</td>' +
          '<td><span class="role-badge role-' + u.role + '">' + (roleMap[u.role] || u.role) + '</span></td>' +
          '<td>' + (u.createdAt || '-') + '</td>' +
          '<td>' + (u.role !== 'admin' ? '<button class="btn-delete" data-type="user" data-id="' + escapedEmail + '">삭제</button>' : '<span class="text-muted">-</span>') + '</td>' +
        '</tr>';
      }).join('');
    }

    // Render posts
    function renderPosts() {
      const posts = Auth.getAllPosts();
      const tbody = document.getElementById('postsBody');
      const empty = document.getElementById('postsEmpty');

      if (posts.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      tbody.innerHTML = posts.map((p, i) => {
        return '<tr>' +
          '<td>' + escapeHtml(p.author) + '</td>' +
          '<td class="post-content-cell">' + escapeHtml(p.text) + '</td>' +
          '<td>' + escapeHtml(p.date) + '</td>' +
          '<td><button class="btn-delete" data-type="post" data-id="' + i + '">삭제</button></td>' +
        '</tr>';
      }).join('');
    }

    // Search
    document.getElementById('memberSearch').addEventListener('input', function() {
      renderMembers(this.value.trim());
    });

    // Delete modal
    let pendingDelete = null;
    const modal = document.getElementById('deleteModal');

    document.addEventListener('click', function(e) {
      if (e.target.classList.contains('btn-delete')) {
        pendingDelete = { type: e.target.dataset.type, id: e.target.dataset.id };
        const text = pendingDelete.type === 'user'
          ? '회원 "' + pendingDelete.id + '"을(를) 삭제하시겠습니까?'
          : '이 게시글을 삭제하시겠습니까?';
        document.getElementById('deleteModalText').textContent = text;
        modal.classList.add('active');
      }
    });

    document.getElementById('deleteCancel').addEventListener('click', function() {
      modal.classList.remove('active');
      pendingDelete = null;
    });

    document.getElementById('deleteConfirm').addEventListener('click', function() {
      if (!pendingDelete) return;
      if (pendingDelete.type === 'user') {
        Auth.deleteUser(pendingDelete.id);
        renderMembers(document.getElementById('memberSearch').value.trim());
      } else {
        Auth.deletePost(parseInt(pendingDelete.id));
        renderPosts();
      }
      modal.classList.remove('active');
      pendingDelete = null;
    });

    modal.addEventListener('click', function(e) {
      if (e.target === modal) {
        modal.classList.remove('active');
        pendingDelete = null;
      }
    });

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Mobile nav toggle
    document.getElementById('navToggle').addEventListener('click', function() {
      this.classList.toggle('active');
      document.getElementById('navMenu').classList.toggle('open');
    });

    // Admin post form
    document.getElementById('adminPostForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const author = document.getElementById('postAuthor').value.trim();
      const region = document.getElementById('postRegion').value.trim();
      const content = document.getElementById('postContent').value.trim();
      if (!author || !content) return;
      const text = region ? region + ' / ' + content : content;
      Auth.addPost(author, text);
      this.reset();
      renderPosts();
    });

    // Initial render
    renderMembers();
    renderPosts();
  </script>
</body>
</html>
