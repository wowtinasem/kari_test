<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 한국진로진학연구원</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="karifavicon.png">
  <link rel="stylesheet" href="styles.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar scrolled" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <img src="karifavicon.png" alt="한국진로진학연구원 로고" class="logo-img">
        <span class="logo-text">한국진로진학연구원</span>
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="메뉴 열기">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-menu" id="navMenu">
        <li><a href="index.html" class="nav-link">홈</a></li>
        <li class="nav-auth" id="navAuth">
          <a href="login.html" class="nav-btn nav-btn-login active">로그인</a>
          <a href="signup.html" class="nav-btn nav-btn-signup">회원가입</a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Login Form -->
  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <img src="karifavicon.png" alt="로고" class="auth-logo">
        <h1>로그인</h1>
        <p>한국진로진학연구원에 오신 것을 환영합니다</p>
      </div>

      <div class="auth-message" id="authMessage"></div>

      <!-- Google Login -->
      <button type="button" class="google-btn" id="googleLoginBtn">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Google로 로그인
      </button>

      <div class="auth-divider">
        <span>또는 이메일로 로그인</span>
      </div>

      <!-- Email Login -->
      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label for="loginEmail">이메일</label>
          <input type="email" id="loginEmail" placeholder="이메일을 입력하세요" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="loginPassword">비밀번호</label>
          <div class="password-wrapper">
            <input type="password" id="loginPassword" placeholder="비밀번호를 입력하세요" required autocomplete="current-password">
            <button type="button" class="password-toggle" id="togglePassword" aria-label="비밀번호 보기">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="auth-submit">이메일로 로그인</button>
      </form>

      <div class="auth-footer">
        <p>아직 회원이 아니신가요? <a href="signup.html">회원가입</a></p>
      </div>
    </div>
  </main>

  <script src="auth.js"></script>
  <script>
    // Google login button
    document.getElementById('googleLoginBtn').addEventListener('click', function() {
      Auth.googleLogin('login');
    });

    // Email login form handler
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      const result = Auth.login(email, password);
      const msgEl = document.getElementById('authMessage');

      if (result.success) {
        msgEl.className = 'auth-message success';
        msgEl.textContent = result.message;
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 800);
      } else {
        msgEl.className = 'auth-message error';
        msgEl.textContent = result.message;
      }
    });

    // Password toggle
    document.getElementById('togglePassword').addEventListener('click', function() {
      const input = document.getElementById('loginPassword');
      input.type = input.type === 'password' ? 'text' : 'password';
    });

    // Mobile nav toggle
    document.getElementById('navToggle').addEventListener('click', function() {
      this.classList.toggle('active');
      document.getElementById('navMenu').classList.toggle('open');
    });
  </script>
</body>
</html>
