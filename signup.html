<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 - 한국진로진학연구원</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="karifavicon.png">
  <link rel="stylesheet" href="styles.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar scrolled" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <img src="karifavicon.png" alt="한국진로진학연구원 로고" class="logo-img">
        <span class="logo-text">한국진로진학연구원</span>
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="메뉴 열기">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-menu" id="navMenu">
        <li><a href="index.html" class="nav-link">홈</a></li>
        <li class="nav-auth" id="navAuth">
          <a href="login.html" class="nav-btn nav-btn-login">로그인</a>
          <a href="signup.html" class="nav-btn nav-btn-signup active">회원가입</a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Signup Form -->
  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <img src="karifavicon.png" alt="로고" class="auth-logo">
        <h1>회원가입</h1>
        <p>간단한 정보를 입력하고 시작하세요</p>
      </div>

      <div class="auth-message" id="authMessage"></div>

      <!-- Google Signup -->
      <button type="button" class="google-btn" id="googleSignupBtn">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Google로 회원가입
      </button>

      <div class="auth-divider">
        <span>또는 이메일로 회원가입</span>
      </div>

      <!-- Email Signup -->
      <form class="auth-form" id="signupForm">
        <div class="form-group">
          <label for="signupName">이름</label>
          <input type="text" id="signupName" placeholder="이름을 입력하세요" required>
        </div>
        <div class="form-group">
          <label for="signupEmail">이메일</label>
          <input type="email" id="signupEmail" placeholder="이메일을 입력하세요" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="signupPassword">비밀번호</label>
          <div class="password-wrapper">
            <input type="password" id="signupPassword" placeholder="8자 이상 입력하세요" required minlength="8" autocomplete="new-password">
            <button type="button" class="password-toggle" id="togglePassword1" aria-label="비밀번호 보기">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="password-strength" id="passwordStrength"></div>
        </div>
        <div class="form-group">
          <label for="signupPasswordConfirm">비밀번호 확인</label>
          <div class="password-wrapper">
            <input type="password" id="signupPasswordConfirm" placeholder="비밀번호를 다시 입력하세요" required minlength="8" autocomplete="new-password">
            <button type="button" class="password-toggle" id="togglePassword2" aria-label="비밀번호 보기">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label for="signupRole">구분</label>
          <select id="signupRole" required>
            <option value="">선택하세요</option>
            <option value="student">학생</option>
            <option value="parent">학부모</option>
            <option value="teacher">교사</option>
            <option value="organization">학원 및 단체</option>
          </select>
        </div>
        <div class="form-check">
          <input type="checkbox" id="agreeTerms" required>
          <label for="agreeTerms">이용약관 및 개인정보처리방침에 동의합니다</label>
        </div>
        <button type="submit" class="auth-submit">이메일로 회원가입</button>
      </form>

      <div class="auth-footer">
        <p>이미 회원이신가요? <a href="login.html">로그인</a></p>
      </div>
    </div>
  </main>

  <!-- Google 회원가입 후 추가정보 입력 모달 -->
  <div class="modal-overlay" id="roleModal">
    <div class="modal-card modal-card-wide">
      <h3>추가 정보 입력</h3>
      <p>Google 계정으로 가입하시려면 아래 정보를 입력해주세요.</p>
      <form id="googleInfoForm" class="google-info-form">
        <div class="form-group">
          <label for="googleName">이름</label>
          <input type="text" id="googleName" placeholder="이름을 입력하세요" required>
        </div>
        <div class="form-group">
          <label for="googlePhone">전화번호</label>
          <input type="tel" id="googlePhone" placeholder="예 : 010-1234-5678" required>
        </div>
        <div class="form-group">
          <label>구분</label>
          <select id="googleRole" required>
            <option value="">선택하세요</option>
            <option value="student">학생</option>
            <option value="parent">학부모</option>
            <option value="teacher">교사</option>
            <option value="organization">학원 및 단체</option>
          </select>
        </div>
        <div class="form-check">
          <input type="checkbox" id="googleAgreeTerms" required>
          <label for="googleAgreeTerms">이용약관 및 개인정보처리방침에 동의합니다</label>
        </div>
        <div class="modal-actions">
          <button type="button" class="modal-btn modal-cancel" id="roleCancelBtn">취소</button>
          <button type="submit" class="modal-btn modal-submit">가입하기</button>
        </div>
      </form>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    // Google signup button
    document.getElementById('googleSignupBtn').addEventListener('click', function() {
      Auth.googleLogin('signup');
    });

    // Google signup info form
    document.getElementById('roleModal').addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('active');
    });

    document.getElementById('roleCancelBtn').addEventListener('click', function() {
      document.getElementById('roleModal').classList.remove('active');
    });

    // Pre-fill name from Google data when modal opens
    var modalObserver = new MutationObserver(function() {
      var modal = document.getElementById('roleModal');
      if (modal.classList.contains('active')) {
        try {
          var pending = JSON.parse(localStorage.getItem('kari_google_pending'));
          if (pending && pending.name) {
            document.getElementById('googleName').value = pending.name;
          }
        } catch(e) {}
      }
    });
    modalObserver.observe(document.getElementById('roleModal'), { attributes: true, attributeFilter: ['class'] });

    document.getElementById('googleInfoForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var name = document.getElementById('googleName').value.trim();
      var phone = document.getElementById('googlePhone').value.trim();
      var role = document.getElementById('googleRole').value;
      if (!name || !phone || !role) return;
      Auth.completeGoogleSignup(role, { name: name, phone: phone });
    });

    // Password strength indicator
    document.getElementById('signupPassword').addEventListener('input', function() {
      const strength = Auth.checkPasswordStrength(this.value);
      const el = document.getElementById('passwordStrength');
      el.className = 'password-strength ' + strength.level;
      el.textContent = strength.text;
    });

    // Signup form handler
    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const passwordConfirm = document.getElementById('signupPasswordConfirm').value;
      const role = document.getElementById('signupRole').value;
      const msgEl = document.getElementById('authMessage');

      if (password !== passwordConfirm) {
        msgEl.className = 'auth-message error';
        msgEl.textContent = '비밀번호가 일치하지 않습니다.';
        return;
      }

      const result = Auth.signup({ name, email, password, role });

      if (result.success) {
        msgEl.className = 'auth-message success';
        msgEl.textContent = result.message;
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1000);
      } else {
        msgEl.className = 'auth-message error';
        msgEl.textContent = result.message;
      }
    });

    // Password toggles
    document.getElementById('togglePassword1').addEventListener('click', function() {
      const input = document.getElementById('signupPassword');
      input.type = input.type === 'password' ? 'text' : 'password';
    });
    document.getElementById('togglePassword2').addEventListener('click', function() {
      const input = document.getElementById('signupPasswordConfirm');
      input.type = input.type === 'password' ? 'text' : 'password';
    });

    // Mobile nav toggle
    document.getElementById('navToggle').addEventListener('click', function() {
      this.classList.toggle('active');
      document.getElementById('navMenu').classList.toggle('open');
    });
  </script>
</body>
</html>
